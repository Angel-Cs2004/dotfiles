# ============================================================
# Kitty config — ordenado por secciones
# Archivo: ~/.config/kitty/kitty.conf
# ============================================================


# ------------------------------
# 1) Fuente (Font)
# ------------------------------
# Usa el nombre EXACTO que te devuelve:
#   fc-list : family | sort | uniq
font_family JetBrainsMono Nerd Font
font_size 10.5

# Si quieres un poco más “grueso” visualmente:
# font_features none
# (normalmente no hace falta tocar nada aquí)


# ------------------------------
# 2) Cursor
# ------------------------------
# Opciones: block | beam | underline
cursor_shape beam
cursor_blink_interval 0.5

# Si quieres que NO parpadee:
# cursor_blink_interval 0


# ------------------------------
# 3) Colores base (theme manual)
# ------------------------------
background #1e1e2e
foreground #cdd6f4

color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

# (Opcional) colores “bright” (8–15). Si no los pones, Kitty deriva algunos.
# color8  #585b70
# color9  #f38ba8
# color10 #a6e3a1
# color11 #f9e2af
# color12 #89b4fa
# color13 #f5c2e7
# color14 #94e2d5
# color15 #a6adc8


# ------------------------------
# 4) Transparencia / Opacidad
# ------------------------------
# 1.0 = sólido, 0.7 = bastante transparente
background_opacity 0.78


# ------------------------------
# 5) Espaciado (Padding/Margins)
# ------------------------------
window_padding_width 12

# Si quieres solo vertical/horizontal distinto:
# window_padding_width 12
# window_padding_height 8

# Si quieres full compacto:
# window_padding_width 0


# ------------------------------
# 6) Ventana / Decoraciones
# ------------------------------
# En Wayland/Hyprland queda limpio
hide_window_decorations yes

# Evita el popup de confirmación al cerrar (si te molesta)
# confirm_os_window_close 0


# ------------------------------
# 7) Calidad de render (recomendado)
# ------------------------------
# Ajusta bien en la mayoría de setups
# (si notas que se ve “borroso”, prueba cambiarlo)
# adjust_line_height 0
# adjust_column_width 0

# Hinting / antialias (suele venir bien por defecto)
# (si lo quieres forzar)
# font_hinting full
# font_hinting medium
# font_hinting none


# ------------------------------
# 8) Scrollback / Historial (útil)
# ------------------------------
scrollback_lines 10000
wheel_scroll_multiplier 3.0


# ------------------------------
# 9) Copiar/Pegar (atajos útiles)
# ------------------------------
# Copiar al portapapeles
map ctrl+shift+c copy_to_clipboard
# Pegar desde el portapapeles
map ctrl+shift+v paste_from_clipboard

# Si quieres que copiar también copie selección (tipo “selecciono y ya”):
# copy_on_select yes


# ------------------------------
# 10) (Opcional) Tabs (si usas varias)
# ------------------------------
# tab_bar_style powerline
# tab_title_template {title}

#--------------------------------
#11) delay
#--------------------------------
repaint_delay 10
input_delay 3
# ============================================================
# Fin
# ============================================================
